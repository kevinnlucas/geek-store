<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geek Store - Proteção Backend</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        header { border-bottom: 2px solid #238636; padding-bottom: 10px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; transition: 0.3s; }
        .card:hover { border-color: #238636; transform: translateY(-5px); }
        .preco { color: #238636; font-weight: bold; font-size: 1.2em; }
        .categoria { background: #21262d; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; }
        .badge-seguro { color: #238636; font-size: 0.9em; float: right; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Geek Store <span style="font-size: 0.5em; color: #8b949e;">| Projeto Acadêmico</span></h1>
            <p>Consumindo dados via JSON estruturado para futura integração com PostgreSQL.</p>
        </header>
        <div id="produtos-lista" class="grid">
            <!-- Os produtos vão aparecer aqui via JS -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
